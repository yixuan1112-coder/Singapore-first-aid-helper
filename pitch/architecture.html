.eyebrow{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:5px;color:var(--critical);text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.eyebrow::before{content:'';width:48px;height:2px;background:var(--critical);box-shadow:0 0 24px rgba(255,59,48,0.55)}
h1{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:0.92;letter-spacing:2px}
h1 .accent{color:var(--critical);text-shadow:0 0 32px rgba(255,59,48,0.4)}
.stamp{font-size:11px;letter-spacing:2px;color:var(--muted-soft);text-align:right;text-transform:uppercase;line-height:1.7}
.stamp strong{color:var(--text)}
.diagram{background:var(--bg-1);border:2px solid var(--border-hot);box-shadow:var(--shadow-hard);padding:24px;position:relative;overflow:hidden}
.diagram::before{content:'13 / ARCHITECTURE';position:absolute;top:-14px;left:24px;background:var(--critical);color:#000;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:4px;padding:4px 14px;border:2px solid #000;z-index:2}
svg.arch{display:block;width:100%;height:auto}
.legend{margin-top:18px;display:flex;flex-wrap:wrap;gap:6px 20px;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-top:2px solid var(--border-hot);padding-top:14px}
.legend i{display:inline-block;width:14px;height:14px;border:1px solid var(--border-hot);margin-right:6px;vertical-align:middle}
.legend i.line{height:3px;width:22px;border:0}
.brand{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:4px;color:var(--muted)}
.brand .dot{width:10px;height:10px;background:var(--critical);box-shadow:0 0 16px rgba(255,59,48,0.55)}
@media print{body{background:var(--bg-0)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.frame{padding:18px}}
</style>
