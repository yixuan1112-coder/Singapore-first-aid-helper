# Mosquitto MQTT 5 broker for the KampungKaki CSOT.
# Two listeners: raw TCP for backend/workers, WebSockets for browsers
# (browsers cannot speak raw MQTT/TCP — they need mqtt-over-websockets).

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Demo/local: anonymous is fine behind the Cloudflare tunnel. For a hardened
# deploy, swap to password_file + per-role ACLs.
allow_anonymous true

# Retained-message + session durability so a client joining late gets the
# current state of every topic it subscribes to, and state survives a restart.
persistence true
persistence_location /mosquitto/data/
autosave_interval 30

max_queued_messages 10000
